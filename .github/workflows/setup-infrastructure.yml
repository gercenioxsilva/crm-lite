name: Setup AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'prod'
        type: choice
        options:
        - prod
      destroy:
        description: 'Destroy infrastructure'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.6.0

jobs:
  setup-infrastructure:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application packages
      run: npm run build:all

    - name: Package Lambda services
      run: bash scripts/package-lambda-services.sh

    - name: Create S3 bucket for Terraform state
      run: |
        aws s3api head-bucket --bucket crm-terraform-state-us-east-1 2>/dev/null || \
        aws s3api create-bucket --bucket crm-terraform-state-us-east-1 --region ${{ env.AWS_REGION }}
        
        aws s3api put-bucket-versioning \
          --bucket crm-terraform-state-us-east-1 \
          --versioning-configuration Status=Enabled || true

    - name: Create ECR repositories
      run: |
        repositories=("crm-api-gateway" "crm-leads")
        
        for repo in "${repositories[@]}"; do
          aws ecr create-repository --repository-name $repo --region ${{ env.AWS_REGION }} || true
        done

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init

    - name: Terraform Workspace
      working-directory: ./terraform
      run: |
        if [ "${{ github.event.inputs.environment }}" != "prod" ]; then
          echo "Only prod can be provisioned from this workflow."
          exit 1
        fi

        terraform workspace select ${{ github.event.inputs.environment }} || \
        terraform workspace new ${{ github.event.inputs.environment }}

    - name: Import Existing Infrastructure
      working-directory: ./terraform
      run: |
        bash ../scripts/terraform-import-existing.sh "${{ github.event.inputs.environment }}"
        bash ../scripts/cleanup-legacy-alb-target-groups.sh "${{ github.event.inputs.environment }}"

    - name: Terraform Plan
      if: github.event.inputs.destroy == 'false'
      working-directory: ./terraform
      env:
        INTERNAL_API_TOKEN_SECRET: ${{ secrets.INTERNAL_API_TOKEN }}
        AUTH_JWT_SECRET_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
        WHATSAPP_ACCESS_TOKEN_SECRET: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
        WHATSAPP_PHONE_NUMBER_ID_SECRET: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
        WHATSAPP_VERIFY_TOKEN_SECRET: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
      run: |
        export TF_VAR_internal_api_token="${INTERNAL_API_TOKEN_SECRET:-change-me-internal-api-token}"
        export TF_VAR_auth_jwt_secret="${AUTH_JWT_SECRET_SECRET:-change-me-auth-jwt-secret}"
        export TF_VAR_whatsapp_access_token="${WHATSAPP_ACCESS_TOKEN_SECRET:-}"
        export TF_VAR_whatsapp_phone_number_id="${WHATSAPP_PHONE_NUMBER_ID_SECRET:-}"
        export TF_VAR_whatsapp_verify_token="${WHATSAPP_VERIFY_TOKEN_SECRET:-quiz-whatsapp-token}"

        terraform plan \
          -var="environment=${{ github.event.inputs.environment }}" \
          -var="image_tag=latest" \
          -out=tfplan

    - name: Terraform Apply
      if: github.event.inputs.destroy == 'false'
      working-directory: ./terraform
      run: terraform apply -auto-approve tfplan

    - name: Terraform Destroy
      if: github.event.inputs.destroy == 'true'
      working-directory: ./terraform
      env:
        INTERNAL_API_TOKEN_SECRET: ${{ secrets.INTERNAL_API_TOKEN }}
        AUTH_JWT_SECRET_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
        WHATSAPP_ACCESS_TOKEN_SECRET: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
        WHATSAPP_PHONE_NUMBER_ID_SECRET: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
        WHATSAPP_VERIFY_TOKEN_SECRET: ${{ secrets.WHATSAPP_VERIFY_TOKEN }}
      run: |
        export TF_VAR_internal_api_token="${INTERNAL_API_TOKEN_SECRET:-change-me-internal-api-token}"
        export TF_VAR_auth_jwt_secret="${AUTH_JWT_SECRET_SECRET:-change-me-auth-jwt-secret}"
        export TF_VAR_whatsapp_access_token="${WHATSAPP_ACCESS_TOKEN_SECRET:-}"
        export TF_VAR_whatsapp_phone_number_id="${WHATSAPP_PHONE_NUMBER_ID_SECRET:-}"
        export TF_VAR_whatsapp_verify_token="${WHATSAPP_VERIFY_TOKEN_SECRET:-quiz-whatsapp-token}"

        terraform destroy -auto-approve \
          -var="environment=${{ github.event.inputs.environment }}" \
          -var="image_tag=latest"

    - name: Output Infrastructure Info
      if: github.event.inputs.destroy == 'false'
      working-directory: ./terraform
      run: |
        echo "## Infrastructure Deployed Successfully! 🚀" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Environment: ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Application URLs:" >> $GITHUB_STEP_SUMMARY
        terraform output -json environment_urls | jq -r 'to_entries[] | "- **\(.key | gsub("_"; " ") | ascii_upcase)**: \(.value)"' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
        echo "1. Push code to trigger deployment workflow" >> $GITHUB_STEP_SUMMARY
        echo "2. Configure GitHub Secrets with infrastructure outputs" >> $GITHUB_STEP_SUMMARY
        echo "3. Set up domain and SSL certificates if needed" >> $GITHUB_STEP_SUMMARY
